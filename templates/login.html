<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Vikas College Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(-45deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 100%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            animation: shimmer 15s ease-in-out infinite;
        }
        
        @keyframes shimmer {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(30px) saturate(180%);
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.1);
        }
        
        .login-container {
            animation: slideIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite, rotate-icon 10s linear infinite;
        }
        
        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.6), 0 0 20px rgba(118, 75, 162, 0.3);
            }
            70% {
                box-shadow: 0 0 0 25px rgba(102, 126, 234, 0), 0 0 30px rgba(118, 75, 162, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0), 0 0 20px rgba(118, 75, 162, 0.3);
            }
        }
        
        @keyframes rotate-icon {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(5deg) scale(1.05); }
            50% { transform: rotate(0deg) scale(1.1); }
            75% { transform: rotate(-5deg) scale(1.05); }
        }
        
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        
        @keyframes floating {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        .login-input {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(102, 126, 234, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .login-input:focus {
            background: rgba(255, 255, 255, 0.95);
            border-color: #667eea;
            box-shadow: 0 0 0 5px rgba(102, 126, 234, 0.15), 0 8px 20px rgba(118, 75, 162, 0.2);
            transform: translateY(-2px);
        }
        
        .login-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 200% 200%;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5);
            animation: pulse-glow 2s infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5);
            }
            50% {
                box-shadow: 0 8px 35px rgba(118, 75, 162, 0.6);
            }
        }
        
        .login-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 12px 40px rgba(118, 75, 162, 0.7);
            background-position: 100% 50%;
        }
    </style>
</head>
<body>
    <div class="w-full max-w-md px-4 relative z-10 login-container">
        <!-- Login Card -->
        <div class="glass-effect rounded-3xl shadow-2xl p-10">
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="w-28 h-28 bg-gradient-to-br from-purple-500 via-pink-500 to-indigo-500 rounded-full mx-auto flex items-center justify-center mb-5 pulse-ring shadow-2xl floating">
                    <i class="fas fa-robot text-white text-5xl"></i>
                </div>
                <h1 class="text-4xl font-bold bg-gradient-to-r from-purple-600 via-pink-600 to-indigo-600 bg-clip-text text-transparent mb-2">Admin Login</h1>
                <p class="text-white drop-shadow-lg mt-3 font-semibold text-lg">Vikas College Chatbot Training Panel</p>
            </div>

            <!-- Error Message -->
            {% if error %}
            <div class="bg-red-50 border-l-4 border-red-500 text-red-700 px-5 py-4 rounded-xl mb-6 flex items-center gap-3 shadow-md">
                <i class="fas fa-exclamation-circle text-xl"></i>
                <span class="font-medium">{{ error }}</span>
            </div>
            {% endif %}

            <!-- Login Form -->
            <form method="POST" action="/login" class="space-y-6">
                <div>
                    <label class="block text-white font-bold mb-3 drop-shadow-lg text-lg">
                        <i class="fas fa-user mr-2"></i>Username
                    </label>
                    <input 
                        type="text" 
                        name="username" 
                        required 
                        class="login-input w-full px-5 py-4 rounded-2xl focus:outline-none font-medium"
                        placeholder="Enter your username">
                </div>

                <div>
                    <label class="block text-white font-bold mb-3 drop-shadow-lg text-lg">
                        <i class="fas fa-lock mr-2"></i>Password
                    </label>
                    <input 
                        type="password" 
                        name="password" 
                        required 
                        class="login-input w-full px-5 py-4 rounded-2xl focus:outline-none font-medium"
                        placeholder="Enter your password">
                </div>

                <button 
                    type="submit" 
                    class="login-btn w-full text-white font-bold py-5 rounded-2xl transition duration-300">
                    <i class="fas fa-sign-in-alt mr-2"></i>Login to Admin Panel
                </button>
            </form>

            <!-- Back to Home -->
            <div class="mt-8 text-center">
                <a href="/" class="inline-flex items-center gap-2 text-white hover:text-white/80 font-bold transition drop-shadow-lg text-lg">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back to Chatbot</span>
                </a>
            </div>

            <!-- Default Credentials Info -->
            <div class="mt-8 p-5 bg-white/20 backdrop-blur-md border-2 border-white/30 rounded-2xl shadow-xl">
                <p class="text-base font-bold text-white mb-3 drop-shadow-lg">
                    <i class="fas fa-info-circle mr-2"></i>Default Credentials:
                </p>
                <p class="text-base text-white drop-shadow-md font-medium">
                    <strong>Username:</strong> admin<br>
                    <strong>Password:</strong> admin123
                </p>
                <p class="text-xs text-yellow-600 mt-2">
                    ⚠️ Change these in production!
                </p>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6 text-white">
            <p class="text-sm">&copy; 2026 AI Chatbot Admin Panel</p>
        </div>
    </div>
</body>
</html>
